name: AI Fix
on:
  issues:
    types: [labeled]

jobs:
  # ── Job 1 ──────────────────────────────────────────────────────────────────
  # Runs the AI agent and immediately pushes a branch.
  # If this succeeds, the changes are persisted regardless of what happens next.
  apply-fix:
    if: github.event.label.name == 'ai-fix'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
    outputs:
      branch: ${{ steps.push.outputs.branch }}
      issue_num: ${{ steps.meta.outputs.issue_num }}
      issue_title: ${{ steps.meta.outputs.issue_title }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Verify ANTHROPIC_API_KEY is NOT set
        run: |
          if [[ -n "${ANTHROPIC_API_KEY:-}" ]]; then
            echo "::error::ANTHROPIC_API_KEY is set; would override Pro subscription auth and incur PAYG charges"
            exit 1
          fi

      - name: Extract issue metadata
        id: meta
        run: |
          echo "issue_num=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")" >> "$GITHUB_OUTPUT"
          echo "issue_title=$(jq -r '.issue.title' "$GITHUB_EVENT_PATH")" >> "$GITHUB_OUTPUT"

      - name: Install Claude Code & OpenCode if missing
        run: |
          command -v claude || npm install -g @anthropic-ai/claude-code
          command -v opencode || curl -fsSL https://opencode.ai/install | bash

      - name: Run AI agent
        run: |
          ISSUE_TITLE="${{ steps.meta.outputs.issue_title }}"
          ISSUE_BODY=$(jq -r '.issue.body' "$GITHUB_EVENT_PATH")
          ISSUE_NUM="${{ steps.meta.outputs.issue_num }}"

          PROMPT=$(cat <<EOF
          You are resolving GitHub issue #${ISSUE_NUM} in jay9297/PathOfBuilding-PoE2.

          Title: ${ISSUE_TITLE}

          Body:
          ${ISSUE_BODY}

          Follow the rules in CLAUDE.md. Make the minimal correct change.
          Add or update tests to cover your fix. Do NOT run tests yourself.
          EOF
          )

          ./scripts/ai-agent.sh "$PROMPT" --mode fix --max-turns 80

      # Push the branch immediately — this is the key resilience change.
      # Even if verify or open-pr fail later, the changes are not lost.
      - name: Commit and push branch
        id: push
        run: |
          BRANCH="ai-fix/issue-${{ steps.meta.outputs.issue_num }}"
          git config user.name "ai-agent[bot]"
          git config user.email "ai-agent@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          if git diff --cached --quiet; then
            echo "::error::No changes produced by agent — aborting"
            exit 1
          fi
          git commit -m "fix: resolve issue #${{ steps.meta.outputs.issue_num }}

          Generated by AI agent in response to issue #${{ steps.meta.outputs.issue_num }}.
          Requires human review before merge."
          git push -u origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

  # ── Job 2 ──────────────────────────────────────────────────────────────────
  # Checks out the already-pushed branch and verifies tests pass.
  # Re-runnable independently; does not touch the agent or re-apply changes.
  verify:
    needs: apply-fix
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.apply-fix.outputs.branch }}

      - name: Cache test image
        id: image-cache
        uses: actions/cache@v4
        with:
          path: /tmp/pob-test-image.tar
          key: pob-test-image-${{ hashFiles('docker-compose.yml') }}
          restore-keys: pob-test-image-

      - name: Pull or restore image
        run: |
          if [[ "${{ steps.image-cache.outputs.cache-hit }}" == "true" ]]; then
            docker load < /tmp/pob-test-image.tar
          else
            docker pull ghcr.io/pathofbuildingcommunity/pathofbuilding-tests:latest
            docker save ghcr.io/pathofbuildingcommunity/pathofbuilding-tests:latest \
              -o /tmp/pob-test-image.tar
          fi

      - name: Run unit tests
        run: docker compose run --rm busted-tests --exclude-tags builds,data

      - name: Run build snapshot tests
        run: docker compose run --rm busted-tests --tags builds

      - name: Run data validation tests
        run: docker compose run --rm busted-tests --tags data

  # ── Job 3 ──────────────────────────────────────────────────────────────────
  # Opens the PR only after tests pass.
  # Re-runnable independently if the gh CLI call flakes.
  open-pr:
    needs: [apply-fix, verify]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4  # needed for gh CLI context
        with:
          ref: ${{ needs.apply-fix.outputs.branch }}

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base dev \
            --head "${{ needs.apply-fix.outputs.branch }}" \
            --title "${{ needs.apply-fix.outputs.issue_title }}" \
            --body "Closes #${{ needs.apply-fix.outputs.issue_num }}

          🤖 This PR was generated by an AI agent. The automated review will
          post a separate comment with detailed feedback. Final approval
          required from @jay9297." \
            --label "ai-generated"
