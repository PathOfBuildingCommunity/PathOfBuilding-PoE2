name: CI
on:
  pull_request:
    branches: [dev]
  push:
    branches: [dev]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Busted unit tests
        run: docker compose run --rm busted-tests

      - name: Run build snapshot tests
        run: docker compose run --rm busted-tests --tags builds

      - name: Run data validation tests
        run: docker compose run --rm busted-tests --tags data

      - name: Coverage report
        run: docker compose run --rm busted-tests --coverage

      - name: Coverage threshold check
        run: |
          # Threshold set after baseline measurement — update this value after Phase 8
          THRESHOLD=${COVERAGE_THRESHOLD:-0}
          if [ "$THRESHOLD" -eq 0 ]; then
            echo "Coverage threshold not yet set — skipping enforcement (baseline measurement pending)"
            exit 0
          fi
          ACTUAL=$(grep -E "^Total" luacov.report.out | awk '{print int($NF)}')
          echo "Coverage: $ACTUAL% (threshold: $THRESHOLD%)"
          if [ "$ACTUAL" -lt "$THRESHOLD" ]; then
            echo "::error::Coverage $ACTUAL% is below threshold $THRESHOLD%"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: luacov.report.out

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
