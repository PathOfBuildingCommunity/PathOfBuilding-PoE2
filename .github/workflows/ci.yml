name: CI
on:
  pull_request:
    branches: [dev]
  push:
    branches: [dev]

jobs:
  # ── Tests run in parallel ───────────────────────────────────────────────────
  test:
    name: test (${{ matrix.suite.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false   # don't cancel sibling suites if one fails
      matrix:
        suite:
          - name: unit
            args: "--exclude-tags builds,data"
          - name: builds
            args: "--tags builds"
          - name: data
            args: "--tags data"
    steps:
      - uses: actions/checkout@v4

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/docker-cache
          key: docker-${{ runner.os }}-${{ hashFiles('Dockerfile', 'docker-compose.yml') }}
          restore-keys: docker-${{ runner.os }}-

      - name: Load cached Docker image
        run: |
          if [ -f /tmp/docker-cache/image.tar ]; then
            docker load < /tmp/docker-cache/image.tar
          fi

      - name: Build Docker image
        run: docker compose build busted-tests

      - name: Save Docker image to cache
        run: |
          mkdir -p /tmp/docker-cache
          docker save $(docker compose config --images busted-tests) \
            -o /tmp/docker-cache/image.tar

      - name: Run ${{ matrix.suite.name }} tests
        run: docker compose run --rm busted-tests ${{ matrix.suite.args }}

  # ── Coverage runs after all test suites pass ────────────────────────────────
  coverage:
    name: coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/docker-cache
          key: docker-${{ runner.os }}-${{ hashFiles('Dockerfile', 'docker-compose.yml') }}
          restore-keys: docker-${{ runner.os }}-

      - name: Load cached Docker image
        run: |
          if [ -f /tmp/docker-cache/image.tar ]; then
            docker load < /tmp/docker-cache/image.tar
          fi

      - name: Generate coverage report
        # Mount the workspace so luacov.report.out lands on the host, not inside the container
        run: |
          docker compose run --rm \
            -v "${{ github.workspace }}:/workspace" \
            busted-tests --coverage

      - name: Verify coverage file exists on host
        run: |
          if [ ! -f luacov.report.out ]; then
            echo "::warning::luacov.report.out not found on host — coverage report may not be mounted correctly"
          fi

      - name: Upload coverage report
        # always() ensures the artifact is uploaded even if the threshold check fails
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: luacov.report.out
          retention-days: 30

      - name: Coverage threshold check
        run: |
          THRESHOLD=${COVERAGE_THRESHOLD:-0}
          if [ "$THRESHOLD" -eq 0 ]; then
            echo "Coverage threshold not yet set — skipping enforcement (baseline measurement pending)"
            exit 0
          fi
          if [ ! -f luacov.report.out ]; then
            echo "::error::luacov.report.out not found — cannot enforce coverage threshold"
            exit 1
          fi
          ACTUAL=$(grep -E "^Total" luacov.report.out | awk '{print int($NF)}')
          if [ -z "$ACTUAL" ]; then
            echo "::error::Could not parse coverage percentage from luacov.report.out"
            exit 1
          fi
          echo "Coverage: $ACTUAL% (threshold: $THRESHOLD%)"
          if [ "$ACTUAL" -lt "$THRESHOLD" ]; then
            echo "::error::Coverage $ACTUAL% is below threshold $THRESHOLD%"
            exit 1
          fi

  # ── Secret scanning runs independently ─────────────────────────────────────
  secrets:
    name: secret-scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      security-events: write  # required to upload SARIF results
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks needs full history for --log-opts=-1

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # .gitleaks.toml in the repo root handles the src/Data/ false positives
